<div class="p-8 grid grid-cols-12 gap-6 w-full mx-auto dark:bg-zinc-950">
  <div class="col-span-12 mt-4">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <app-title title="Dicionário Técnico" subTitle="Explicação dos termos técnicos usados"></app-title>
      <div class="w-full md:w-96 relative">
        <span
          class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline dark:text-zinc-500">search</span>
        <input
          class="w-full pl-10 pr-4 py-2 bg-surface-container dark:bg-zinc-800 rounded-lg border border-outline-variant/40 dark:border-zinc-700 focus:border-primary dark:focus:border-primary-fixed focus:ring-1 focus:ring-primary dark:focus:ring-primary-fixed text-sm transition-all text-on-surface dark:text-zinc-100 placeholder-on-surface-variant/50 dark:placeholder-zinc-500"
          placeholder="Filtrar indicadores por nome ou código..." type="text" />
      </div>
    </div>
    <div
      class="bg-surface-container-lowest dark:bg-zinc-900 rounded-xl shadow-sm border border-outline-variant/40 dark:border-zinc-800 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-200">
          <thead>
            <tr
              class="bg-surface-container-low dark:bg-zinc-800/60 text-on-surface-variant dark:text-zinc-400 border-b border-outline-variant dark:border-zinc-800">
              <th class="px-6 py-4 font-bold text-label-md uppercase tracking-wider">Descrição Técnica</th>
              <th class="px-6 py-4 font-bold text-label-md uppercase tracking-wider">Tipo de dados</th>
              <th class="px-6 py-4 font-bold text-label-md uppercase tracking-wider">Fórmula ou Origem</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-outline-variant/30 dark:divide-zinc-800/80">
            @for (item of paginatedData(); track $index) {
            <tr
              class="zebra-row hover:bg-surface-container/50 dark:hover:bg-zinc-800/40 transition-colors cursor-pointer group">
              <td class="px-6 py-4">
                <div class="flex flex-col">
                  <span class="font-label-md text-primary dark:text-primary-fixed font-bold">{{item.Coluna}}</span>
                  <span class="text-xs text-outline dark:text-zinc-400">{{item.O_que_significa_para_leigos}}</span>
                </div>
              </td>
              <td class="px-6 py-4 text-sm text-on-surface-variant dark:text-zinc-300">{{item.Tipo_de_Dado}}</td>
              <td class="px-6 py-4">
                <span
                  class="text-[10px] font-bold bg-surface-container dark:bg-zinc-800 px-2 py-1 rounded border border-outline-variant/40 dark:border-zinc-700 text-on-surface dark:text-zinc-200">{{item.Formula_ou_Origem}}</span>
              </td>

            </tr>
            }

          </tbody>
        </table>
      </div>
      <app-pagination [extendedStyle]="true" [totalPage]="totalPages()" [page]="page()" (pageChange)="page.set($event)"
        [end]="end" [start]="start + 1"></app-pagination>
    </div>
  </div>
</div>
