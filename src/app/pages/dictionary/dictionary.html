<div class="p-8 grid grid-cols-12 gap-6 w-full mx-auto">
  <!-- <app-kpi class="col-span-12"></app-kpi> -->

  <!-- Technical Dictionary (Span 12) -->
  <div class="col-span-12 mt-4">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <app-title title="Dicionário Técnico" subTitle="Explicação dos termos técnicos usados"></app-title>
      <div class="w-full md:w-96 relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">search</span>
        <input
          class="w-full pl-10 pr-4 py-2 bg-surface-container rounded-lg border border-outline-variant/40 focus:border-primary dark:focus:border-primary-fixed focus:ring-1 focus:ring-primary dark:focus:ring-primary-fixed text-sm transition-all dark:text-on-surface dark:placeholder-on-surface-variant/50"
          placeholder="Filtrar indicadores por nome ou código..." type="text" />
      </div>
    </div>
    <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/40 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-200">
          <thead>
            <tr
              class="bg-surface-container-low dark:bg-surface-container text-on-surface-variant border-b border-outline-variant">
              <!-- <th class="px-6 py-4 font-bold text-label-md uppercase tracking-wider">Code</th> -->
              <th class="px-6 py-4 font-bold text-label-md uppercase tracking-wider">Descrição Técnica</th>
              <th class="px-6 py-4 font-bold text-label-md uppercase tracking-wider">Tipo de dados</th>
              <th class="px-6 py-4 font-bold text-label-md uppercase tracking-wider">Fórmula ou Origem</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-outline-variant/30">
            @for (item of paginatedData(); track $index) {
            <tr
              class="zebra-row hover:bg-surface-container/50 dark:hover:bg-white/5 transition-colors cursor-pointer group">
              <!-- <td class="px-6 py-4 font-label-md text-primary dark:text-primary-fixed font-bold"></td> -->
              <td class="px-6 py-4">
                <div class="flex flex-col">
                  <span class="font-label-md text-primary dark:text-primary-fixed font-bold">{{item.Coluna}}</span>
                  <span class="text-xs text-outline">{{item.O_que_significa_para_leigos}}</span>
                </div>
              </td>
              <td class="px-6 py-4 text-sm text-on-surface-variant">{{item.Tipo_de_Dado}}</td>
              <td class="px-6 py-4">
                <span
                  class="text-[10px] font-bold bg-surface-container dark:bg-outline-variant/20 px-2 py-1 rounded border border-outline-variant/40 dark:text-on-surface">{{item.Formula_ou_Origem}}</span>
              </td>

            </tr>
            }

          </tbody>
        </table>
      </div>
      <app-pagination [extendedStyle]="true" [totalPage]="totalPages()" [page]="page()" (pageChange)="page.set($event)"
        [end]="end" [start]="start + 1"></app-pagination>
    </div>
  </div>
</div>
