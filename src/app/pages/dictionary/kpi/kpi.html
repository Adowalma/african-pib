<div class="grid grid-cols-12 gap-6  ">
  <!-- KPI Cards (Span 3 each) -->
  <!-- GDP PPP -->
  <div
    class="col-span-12 sm:col-span-6 lg:col-span-3 bg-surface-container-lowest p-card-padding rounded-xl border border-outline-variant/40 shadow-sm kpi-card transition-all cursor-pointer">
    <div class="flex justify-between items-start mb-4">
      <span class="text-label-md font-medium text-on-surface-variant">{{kpiData[0].KPI}}</span>
      <span
        class="text-primary dark:text-primary-fixed font-bold text-xs bg-primary-container/20 px-2 py-0.5 rounded">+4.2%</span>
    </div>
    <div class="flex flex-col">
      <span class="text-data-numeric font-bold text-on-surface">{{kpiData[0].Valor}}</span>
      <p class="text-xs text-outline mt-1 italic">Int. Dollars (2024 Current)</p>
    </div>
    <div class="mt-6 h-12 w-full relative overflow-hidden rounded bg-surface-container-low dark:bg-surface-container">
      <div class="absolute bottom-0 left-0 w-full h-full sparkline-gradient"></div>
      <svg class="absolute bottom-0 left-0 w-full h-10" preserveaspectratio="none" viewbox="0 0 100 40">
        <path class="text-primary dark:text-primary-fixed" d="M0 35 Q 25 38, 50 20 T 100 5" fill="none"
          stroke="currentColor" stroke-width="2"></path>
      </svg>
    </div>
  </div>
  <!-- Growth Rate -->
  <div
    class="col-span-12 sm:col-span-6 lg:col-span-3 bg-surface-container-lowest p-card-padding rounded-xl border border-outline-variant/40 shadow-sm kpi-card transition-all cursor-pointer">
    <div class="flex justify-between items-start mb-4">
      <span class="text-label-md font-medium text-on-surface-variant">Avg. Growth Rate</span>
      <span class="material-symbols-outlined text-secondary dark:text-secondary-fixed-dim">trending_up</span>
    </div>
    <div class="flex flex-col">
      <span class="text-data-numeric font-bold text-on-surface">3.8%</span>
      <p class="text-xs text-outline mt-1">Continental Median</p>
    </div>
    <div class="mt-6 flex gap-1.5 items-end h-12">
      <div class="flex-1 bg-surface-container h-4 rounded-t-sm"></div>
      <div class="flex-1 bg-surface-container h-6 rounded-t-sm"></div>
      <div class="flex-1 bg-secondary-container h-10 rounded-t-sm"></div>
      <div class="flex-1 bg-primary dark:bg-primary-fixed h-12 rounded-t-sm"></div>
      <div class="flex-1 bg-surface-container h-8 rounded-t-sm"></div>
    </div>
  </div>
  <!-- Inflation -->
  <div
    class="col-span-12 sm:col-span-6 lg:col-span-3 bg-surface-container-lowest p-card-padding rounded-xl border border-outline-variant/40 shadow-sm kpi-card transition-all cursor-pointer">
    <div class="flex justify-between items-start mb-4">
      <span class="text-label-md font-medium text-on-surface-variant">Avg. Inflation</span>
      <span
        class="text-error dark:text-secondary-fixed font-bold text-xs bg-error-container dark:bg-secondary-fixed/20 px-2 py-0.5 rounded">-1.2%</span>
    </div>
    <div class="flex flex-col">
      <span class="text-data-numeric font-bold text-on-surface">15.2%</span>
      <p class="text-xs text-outline mt-1">Weight-adjusted average</p>
    </div>
    <div class="mt-6">
      <div class="flex items-center justify-between text-[10px] font-bold text-outline mb-1 px-1">
        <span>JAN</span>
        <span>JUN</span>
        <span>DEC</span>
      </div>
      <div class="w-full bg-surface-container h-2 rounded-full overflow-hidden">
        <div class="bg-error dark:bg-secondary w-3/4 h-full rounded-full transition-all duration-1000"></div>
      </div>
    </div>
  </div>
  <!-- Regional Leader -->
  <div
    class="col-span-12 sm:col-span-6 lg:col-span-3 bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container p-card-padding rounded-xl shadow-md relative overflow-hidden transition-transform hover:scale-[1.01] cursor-pointer">
    <div class="relative z-10">
      <span class="text-label-md font-medium opacity-80">Highest Regional Growth</span>
      <h3 class="text-headline-sm font-bold mt-2">Ethiopia</h3>
      <div class="flex items-center gap-2 mt-4">
        <span class="text-3xl font-bold">6.1%</span>
        <span class="material-symbols-outlined">rocket_launch</span>
      </div>
    </div>
    <div class="absolute -right-6 -bottom-6 opacity-10">
      <span class="material-symbols-outlined text-[140px]" style="font-variation-settings: 'FILL' 1;">public</span>
    </div>
  </div>
</div>
