<aside
  class="fixed inset-y-0 left-0 w-64 bg-surface-container-lowest dark:bg-zinc-900 border-r border-outline-variant/30 dark:border-zinc-800 z-50 flex flex-col transition-colors duration-300">

  <div class="p-6 flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl premium-gradient flex items-center justify-center text-on-primary shadow-lg">
    </div>
    <div class="flex flex-col">
      <h1 class="text-headline-sm font-bold text-primary dark:text-zinc-100 leading-none">PIB África</h1>
      <span
        class="text-[10px] uppercase font-bold tracking-widest text-on-surface-variant dark:text-zinc-400 opacity-60">
        Insights Económicos
      </span>
    </div>
  </div>

  <nav class="flex-1 px-4 mt-4 space-y-1">
    <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-semibold text-on-surface dark:text-zinc-300 hover:bg-surface-container-high dark:hover:bg-zinc-800"
      routerLink="paises" routerLinkActive="active">
      <span class="material-symbols-outlined text-on-surface-variant dark:text-zinc-400">public</span>
      Países
    </a>
    <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-surface-container-high dark:hover:bg-zinc-800 transition-all font-semibold text-on-surface dark:text-zinc-300"
      routerLink="regional" routerLinkActive="active">
      <span class="material-symbols-outlined text-on-surface-variant dark:text-zinc-400">map</span>
      Regiões
    </a>
    <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-surface-container-high dark:hover:bg-zinc-800 transition-all font-semibold text-on-surface dark:text-zinc-300"
      routerLink="temporal" routerLinkActive="active">
      <span class="material-symbols-outlined text-on-surface-variant dark:text-zinc-400">timeline</span>
      Timeline
    </a>
    <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-surface-container-high dark:hover:bg-zinc-800 transition-all font-semibold text-on-surface dark:text-zinc-300"
      routerLink="dicionario" routerLinkActive="active">
      <span class="material-symbols-outlined text-on-surface-variant dark:text-zinc-400">menu_book</span>
      Dicionário
    </a>
  </nav>

  <div class="p-4 border-t border-outline-variant/20 dark:border-zinc-800">

    <button
      class="w-full flex items-center justify-between p-3 rounded-xl bg-surface-container-low dark:bg-zinc-800/50 hover:bg-surface-container-high dark:hover:bg-zinc-800 text-on-surface dark:text-zinc-200 transition-all group"
      id="theme-toggle" (click)="toggleTheme()">
      <div class="flex items-center gap-3">
        @if (isDark) {
        <span class="material-symbols-outlined text-amber-400">dark_mode</span>
        } @else {
        <span class="material-symbols-outlined text-zinc-500">light_mode</span>
        }
        <span class="text-sm font-semibold">Tema</span>
      </div>

      <div class="w-10 h-5 bg-outline-variant/50 dark:bg-zinc-700 rounded-full relative p-0.5 transition-colors">
        <div class="w-4 h-4 bg-white rounded-full transition-transform shadow-sm" [class.translate-x-5]="isDark"></div>
      </div>
    </button>

    <div class="mt-4 flex items-center gap-3 p-3">
      <div
        class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/30 dark:border-zinc-700 bg-surface-container dark:bg-zinc-800 flex items-center justify-center shrink-0">
        <svg class="w-6 h-6 text-on-surface-variant dark:text-zinc-400" fill="none" stroke="currentColor"
          stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
      </div>
      <div class="flex flex-col min-w-0">
        <span class="text-sm font-bold truncate text-on-surface dark:text-zinc-200">Dr. Analista</span>
        <span class="text-[11px] text-on-surface-variant dark:text-zinc-400 opacity-70 truncate">Gestor Sênior</span>
      </div>
    </div>

  </div>
</aside>
