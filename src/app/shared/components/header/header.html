<header
  class="sticky top-0 z-40 h-16 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md border-b border-outline-variant/20 dark:border-zinc-800/50 px-8 flex items-center justify-between transition-colors duration-300">

  <div class="flex items-center gap-4 flex-1">
    <div class="relative w-96">
      <nav class="flex items-center gap-2 text-on-surface-variant/70 dark:text-zinc-500">
        <span class="text-[12px] font-bold uppercase tracking-widest">Dashboard</span>
        <span class="material-symbols-outlined text-[14px]">chevron_right</span>
        <span class="text-[12px] font-bold uppercase tracking-widest text-secondary dark:text-zinc-300 opacity-80">
          {{pageTitle()}}
        </span>
      </nav>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <button
      class="p-2 rounded-lg hover:bg-surface-container-high dark:hover:bg-zinc-800/60 relative text-on-surface-variant dark:text-zinc-400 transition-colors">
      <span class="material-symbols-outlined">notifications</span>
    </button>

    <button
      class="p-2 rounded-lg hover:bg-surface-container-high dark:hover:bg-zinc-800/60 text-on-surface-variant dark:text-zinc-400 transition-colors">
      <span class="material-symbols-outlined">settings</span>
    </button>

    <div class="h-6 w-px bg-outline-variant/30 dark:bg-zinc-800 mx-2"></div>

    <button
      class="premium-gradient text-on-primary px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 hover:opacity-90 transition-all active:scale-95 shadow-sm">
      <span class="material-symbols-outlined text-[18px]">cloud_download</span>
      Exportar
    </button>
  </div>

</header>
