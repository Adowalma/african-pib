<header
  class="sticky top-0 z-40 h-16 bg-white/80 dark:bg-on-background/80 backdrop-blur-md border-b border-outline-variant/20 px-8 flex items-center justify-between">
  <div class="flex items-center gap-4 flex-1">
    <div class="relative w-96">
      <nav class="flex items-center gap-2 text-on-surface-variant/70">
        <span class="text-[12px] font-bold uppercase tracking-widest">Dashboard</span>
        <span class="material-symbols-outlined text-[14px]">chevron_right</span>
        <span
          class="text-[12px] font-bold uppercase tracking-widest text-secondary dark:text-secondary-fixed opacity-60">{{pageTitle()}}</span>
      </nav>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <button
      class="p-2 rounded-lg hover:bg-surface-container-high dark:hover:bg-surface-variant/10 relative text-on-surface-variant dark:text-slate-400">
      <span class="material-symbols-outlined">notifications</span>
      <!-- <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span> -->
    </button>
    <button
      class="p-2 rounded-lg hover:bg-surface-container-high dark:hover:bg-surface-variant/10 text-on-surface-variant dark:text-slate-400">
      <span class="material-symbols-outlined">settings</span>
    </button>
    <div class="h-6 w-px bg-outline-variant/30 mx-2"></div>
    <button class="premium-gradient text-on-primary px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2">
      <span class="material-symbols-outlined text-[18px]">cloud_download</span>
      Exportar
    </button>
  </div>
</header>
