<header
  class="sticky top-0 z-40 h-16 bg-white/80 dark:bg-on-background/80 backdrop-blur-md border-b border-outline-variant/20 px-8 flex items-center justify-between">
  <div class="flex items-center gap-4 flex-1">
    <div class="relative w-96">
      <span
        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">search</span>
      <input
        class="w-full bg-surface-container-low dark:bg-surface-variant/10 border-none rounded-xl py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20 placeholder-on-surface-variant/60"
        placeholder="Pesquisar métricas ou nações..." type="text" />
    </div>
  </div>
  <div class="flex items-center gap-4">

      <span class="material-symbols-outlined">notifications</span>
      <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
    </button>
    <button class="p-2 rounded-lg hover:bg-surface-container-high dark:hover:bg-surface-variant/10">
      <span class="material-symbols-outlined">settings</span>
    </button>
    <div class="h-6 w-px bg-outline-variant/30 mx-2"></div>
    <button class="premium-gradient text-on-primary px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2">
      <span class="material-symbols-outlined text-[18px]">cloud_download</span>
      Exportar
    </button>
  </div>
</header>
